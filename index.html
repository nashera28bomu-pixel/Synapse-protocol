<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SYNAPSE PROTOCOL | CYMORTECH AAA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- AUDIO -->
<audio id="ambient" autoplay loop>
    <source src="audio/ambient.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
    <source src="audio/click.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<section id="intro-screen" class="screen active">

    <div class="logo-container">

        <div class="logo-ring"></div>
        <div class="logo-ring ring2"></div>

        <div class="logo-core">
            <span>C</span>
        </div>

    </div>

    <h1 class="main-title glitch" data-text="SYNAPSE PROTOCOL">
        SYNAPSE PROTOCOL
    </h1>

    <p class="subtitle">
        CYMORTECH SERVICES PRESENTS
    </p>

    <div class="intro-warning">
        Unauthorized neural synchronization is prohibited.
    </div>

    <button id="continueBtn" class="cyber-btn">
        TAP TO CONTINUE
    </button>

</section>

<!-- BIOMETRIC -->
<section id="bio-screen" class="screen hidden">

    <div class="scanner-box">

        <div class="scanner-line"></div>

        <video id="webcam" autoplay muted playsinline></video>

        <div class="scanner-overlay"></div>

    </div>

    <div class="scan-status">
        <h2>BIOMETRIC VERIFICATION</h2>
        <p>Align face with scan frame</p>
    </div>

    <button id="scanBtn" class="cyber-btn">
        INITIALIZE ERYX
    </button>

</section>

<!-- HUD -->
<section id="hud" class="hidden">

    <header class="topbar">

        <div>
            OPERATIVE:
            <span id="operativeName">GUEST</span>
        </div>

        <div>
            TRUST:
            <span id="trustLevel">100%</span>
        </div>

        <div>
            STATUS:
            <span class="status-online">ONLINE</span>
        </div>

    </header>

    <main class="hud-layout">

        <!-- LEFT -->
        <div class="panel left-panel">

            <h2>ERYX CORE</h2>

            <div class="probability-box">
                <span id="probability">92%</span>
            </div>

            <div class="stat-grid">

                <div class="stat-card">
                    Calmness
                    <span id="calmness">100</span>
                </div>

                <div class="stat-card">
                    Focus
                    <span id="focus">100</span>
                </div>

                <div class="stat-card">
                    Logic
                    <span id="logic">100</span>
                </div>

                <div class="stat-card">
                    Threat
                    <span id="threat">LOW</span>
                </div>

            </div>

            <div id="eryxDialogue" class="eryx-box">
                ERYX: Awaiting mission synchronization...
            </div>

            <div class="character-buttons">
                <button onclick="talkTo('kael')">ASK KAEL</button>
                <button onclick="talkTo('liara')">ASK LIARA</button>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="panel right-panel">

            <div id="missionBrief"></div>

            <div id="liveFeed"></div>

        </div>

    </main>

</section>

<script src="characters.js"></script>
<script src="missions.js"></script>
<script src="script.js"></script>
</body>
</html>
