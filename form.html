<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace Deployment — Cymor Commerce</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glassmorphism { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-terminal { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-tray { min-height: 80px; display: flex; align-items: center; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col antialiased">

    <header class="w-full px-6 py-4 flex justify-between items-center glassmorphism shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-cyan-500 to-indigo-500 p-2.5 rounded-xl shadow-lg">
                <i class="fa-solid fa-microchip text-xl text-white"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg text-white">Cymor Core AI</h1>
                <p class="text-[10px] text-cyan-400 font-black tracking-widest">SYSTEM INITIALIZATION</p>
            </div>
        </div>
        <div id="session-badge" class="hidden sm:flex items-center gap-2 bg-slate-900/80 border border-white/10 px-4 py-2 rounded-xl">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span id="merchant-name" class="text-xs font-bold text-slate-300">...</span>
        </div>
    </header>

    <main class="flex-1 w-full max-w-3xl mx-auto px-6 py-12 flex flex-col justify-center">
        <div class="glass-terminal rounded-3xl border border-white/10 shadow-2xl overflow-hidden flex flex-col min-h-[600px]">
            
            <div class="bg-slate-950/40 p-5 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-3">
                    <span id="step-count" class="text-[10px] font-black text-cyan-400 bg-cyan-400/10 px-3 py-1 rounded-full border border-cyan-400/20 uppercase tracking-tighter">Question 1 of 6</span>
                </div>
                <div class="w-40 bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-cyan-400 to-indigo-500 h-full w-[16%] transition-all duration-700"></div>
                </div>
            </div>

            <div id="chat-container" class="flex-1 p-8 space-y-8 overflow-y-auto max-h-[420px] scrollbar-none">
                <div class="flex items-start gap-4" id="ai-bubble-wrap">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-cyan-500 to-indigo-600 flex items-center justify-center text-white shadow-lg flex-shrink-0">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="bg-slate-800/40 border border-white/10 p-5 rounded-3xl rounded-tl-none max-w-[85%] shadow-xl">
                        <p id="ai-text" class="text-sm md:text-base leading-relaxed font-medium">Initializing... **What is your Business Name?**</p>
                    </div>
                </div>

                <div id="success-result" class="hidden space-y-6 animate-in fade-in zoom-in duration-500">
                    <div class="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl text-center space-y-4">
                        <div class="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-2xl">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <h3 class="text-xl font-black text-white">Store Environment Live!</h3>
                        <div class="flex items-center gap-2 bg-slate-950/80 p-4 rounded-2xl border border-white/10">
                            <code id="final-url" class="flex-1 text-cyan-400 font-mono text-sm overflow-hidden text-ellipsis whitespace-nowrap">cymor.ai/shop/loading...</code>
                            <button id="copy-link-btn" class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 px-4 py-2 rounded-xl text-xs font-black transition-all flex items-center gap-2 cursor-pointer">
                                <i class="fa-solid fa-copy"></i> COPY
                            </button>
                        </div>
                    </div>
                    <button onclick="window.location.href='index.html'" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-2xl text-sm font-bold transition-all">Return to Dashboard</button>
                </div>
            </div>

            <div class="p-6 bg-slate-950/60 border-t border-white/5">
                <div id="input-group" class="input-tray gap-3">
                    <input type="text" id="user-input" placeholder="Type here..." class="flex-1 bg-slate-900/80 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-cyan-500 transition-all text-white">
                    <button id="submit-btn" class="bg-gradient-to-tr from-cyan-500 to-indigo-500 hover:scale-[1.05] transition-all text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg cursor-pointer flex-shrink-0">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>

                <div id="inventory-group" class="hidden space-y-4 pt-2">
                    <div class="grid grid-cols-2 gap-3">
                        <button id="add-manual" class="bg-slate-800 border border-white/10 p-4 rounded-2xl text-xs font-bold hover:bg-slate-700 transition-all"><i class="fa-solid fa-plus mr-2 text-cyan-400"></i> Manual Item</button>
                        <label class="bg-slate-800 border border-white/10 p-4 rounded-2xl text-xs font-bold hover:bg-slate-700 transition-all text-center cursor-pointer">
                            <i class="fa-solid fa-file-csv mr-2 text-emerald-400"></i> CSV Upload
                            <input type="file" id="csv-input" class="hidden">
                        </label>
                    </div>
                    <button id="finalize-btn" class="w-full bg-gradient-to-r from-cyan-500 via-indigo-600 to-purple-600 py-5 rounded-2xl text-sm font-black uppercase tracking-widest shadow-xl shadow-indigo-500/20 cursor-pointer">Generate Live Store Link</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 text-center text-[10px] text-slate-600 font-bold uppercase tracking-[0.2em]">
        &copy; 2026 CymorTechServices &bull; Built by Legendary Smiley Cymor
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const user = JSON.parse(localStorage.getItem("cymor_merchant_user"));
            if(!user) { window.location.href = "register.html"; return; }
            document.getElementById("merchant-name").textContent = user.name;

            let step = 1;
            const data = { items: [] };
            const questions = [
                "**What is your complete Business Name?**",
                "Enter your **WhatsApp Number** (with country code, e.g., 254...)",
                "Write a short **Business Description** for the AI.",
                "List your **Categories** (e.g. Shoes, Tech, Clothes)",
                "Enter **Payment/Delivery Instructions** (e.g. Lipa na Mpesa Till 123)",
                "Almost there! Now **add your products** to finish."
            ];

            const aiText = document.getElementById("ai-text");
            const userInput = document.getElementById("user-input");
            const submitBtn = document.getElementById("submit-btn");
            const progressBar = document.getElementById("progress-bar");
            const stepCount = document.getElementById("step-count");

            function nextStep() {
                const val = userInput.value.trim();
                if(!val && step < 6) return;

                // Save data
                if(step === 1) data.name = val;
                if(step === 2) data.phone = val;

                step++;
                if(step <= 6) {
                    userInput.value = "";
                    aiText.innerHTML = questions[step-1];
                    stepCount.textContent = `Question ${step} of 6`;
                    progressBar.style.width = `${(step/6)*100}%`;

                    if(step === 6) {
                        document.getElementById("input-group").classList.add("hidden");
                        document.getElementById("inventory-group").classList.remove("hidden");
                    }
                }
            }

            submitBtn.addEventListener("click", nextStep);
            userInput.addEventListener("keypress", (e) => e.key === "Enter" && nextStep());

            document.getElementById("finalize-btn").addEventListener("click", () => {
                // Generate Real Slug
                const slug = data.name.toLowerCase().replace(/[^a-z0-9]/g, '-');
                const finalUrl = `cymor.ai/shop/${slug}`;
                
                // Update LocalStorage
                user.storeLink = slug;
                user.storeUrl = finalUrl;
                localStorage.setItem("cymor_merchant_user", JSON.stringify(user));

                // UI Transition
                document.getElementById("ai-bubble-wrap").classList.add("hidden");
                document.getElementById("inventory-group").classList.add("hidden");
                document.getElementById("success-result").classList.remove("hidden");
                document.getElementById("final-url").textContent = finalUrl;
            });

            document.getElementById("copy-link-btn").addEventListener("click", function() {
                const url = document.getElementById("final-url").textContent;
                navigator.clipboard.writeText(url);
                this.innerHTML = `<i class="fa-solid fa-check"></i> COPIED!`;
                this.classList.replace("bg-cyan-500", "bg-emerald-500");
                setTimeout(() => {
                    this.innerHTML = `<i class="fa-solid fa-copy"></i> COPY`;
                    this.classList.replace("bg-emerald-500", "bg-cyan-500");
                }, 2000);
            });
        });
    </script>
</body>
</html>
