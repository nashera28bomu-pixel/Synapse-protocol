<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup Your Business | Cymor Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .input-style { width: 100%; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body class="py-12 px-6">
    <div class="max-w-4xl mx-auto glass p-10 rounded-[30px]">
        <h2 class="text-3xl font-black mb-2">Configure Your Business</h2>
        <p class="text-slate-400 mb-10">Fill in your business details to power your AI assistant.</p>

        <form id="businessForm" class="space-y-8">
            <div class="grid md:grid-cols-2 gap-6">
                <input type="text" id="bizName" placeholder="Business Name" class="input-style" required>
                <input type="text" id="bizPhone" placeholder="WhatsApp Number (e.g. 254...)" class="input-style" required>
            </div>
            <textarea id="bizDesc" placeholder="Brief Business Description" class="input-style h-24"></textarea>
            <textarea id="paymentInfo" placeholder="Payment Methods & Instructions (Press Enter for new lines)" class="input-style h-32 whitespace-pre-wrap"></textarea>

            <div>
                <label class="block mb-4 font-bold text-lg">Delivery Locations & Fees</label>
                <table id="deliveryTable" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-sm">
                            <th class="pb-2">Location</th>
                            <th class="pb-2">Price</th>
                            <th class="pb-2">Arrival</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" class="input-style mb-2 location" placeholder="e.g. CBD"></td>
                            <td><input type="text" class="input-style mb-2 price" placeholder="e.g. 200"></td>
                            <td><input type="text" class="input-style mb-2 arrival" placeholder="e.g. 30 mins"></td>
                        </tr>
                    </tbody>
                </table>
                <button type="button" onclick="addRow()" class="text-blue-400 text-sm mt-2">+ Add Location</button>
            </div>

            <div class="glass p-6 rounded-2xl">
                <label class="block mb-4 font-bold text-lg">Add Products</label>
                <input type="file" id="csvFile" class="block w-full text-sm text-slate-400 mb-4 file:bg-blue-600 file:px-4 file:py-2 file:rounded-full file:border-0">
                <p class="text-slate-500 text-xs text-center">OR upload CSV (Columns: code, name, price, description)</p>
            </div>

            <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg hover:bg-blue-500 transition">Complete Setup 🚀</button>
        </form>
    </div>

    <script>
        function addRow() {
            const tbody = document.querySelector("#deliveryTable tbody");
            tbody.innerHTML += `<tr>
                <td><input type="text" class="input-style mb-2 location"></td>
                <td><input type="text" class="input-style mb-2 price"></td>
                <td><input type="text" class="input-style mb-2 arrival"></td>
            </tr>`;
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
