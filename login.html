<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Cymor AI Commerce</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between antialiased">

    <!-- 🟢 NAVBAR BRIDGE -->
    <header class="w-full px-6 py-4 flex justify-between items-center glassmorphism shadow-lg">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="bg-gradient-to-tr from-cyan-500 to-indigo-500 p-2.5 rounded-xl group-hover:scale-105 transition-transform">
                <i class="fa-solid fa-bolt text-xl text-white"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl tracking-tight text-white">Cymor Commerce</h1>
                <p class="text-xs text-cyan-400 font-medium">BACK TO MAIN PLATFORM</p>
            </div>
        </a>
    </header>

    <!-- 🔒 LOGIN FRAME SECTION -->
    <main class="w-full max-w-md mx-auto px-6 py-12 flex-1 flex flex-col justify-center">
        <div class="glassmorphism p-8 rounded-2xl border border-white/10 shadow-2xl space-y-6 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -z-10"></div>
            
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-extrabold tracking-tight text-white">Welcome Back</h2>
                <p class="text-xs text-slate-400">Log in to manage your AI assistant & workspace matrices</p>
            </div>

            <!-- Error Banner Display Area -->
            <div id="error-message" class="hidden p-3.5 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs flex items-center gap-2.5 animate-pulse">
                <i class="fa-solid fa-circle-exclamation text-sm"></i>
                <span id="error-text">Invalid credential processing parameters.</span>
            </div>

            <!-- Native Credential Input Matrix Form -->
            <form id="login-form" class="space-y-4">
                <div class="space-y-1.5">
                    <label for="email" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Business Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" required placeholder="merchant@business.com" class="w-full bg-slate-900/60 border border-white/5 rounded-xl pl-11 pr-4 py-3 text-sm focus:outline-none focus:border-cyan-500 text-slate-100 placeholder-slate-600 transition-colors">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs text-cyan-400 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" required placeholder="••••••••••••" class="w-full bg-slate-900/60 border border-white/5 rounded-xl pl-11 pr-4 py-3 text-sm focus:outline-none focus:border-cyan-500 text-slate-100 placeholder-slate-600 transition-colors">
                    </div>
                </div>

                <!-- Submit Button Shell -->
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-tr from-cyan-500 via-indigo-500 to-purple-600 hover:scale-[1.01] transition-all text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/10 flex items-center justify-center gap-2 cursor-pointer mt-2 text-sm">
                    Access Dashboard <i class="fa-solid fa-right-to-bracket text-xs"></i>
                </button>
            </form>

            <div class="relative flex py-2 items-center text-xs text-slate-600 uppercase tracking-widest">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="flex-shrink mx-4">Or Connect Seamlessly</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>

            <!-- Alternative Federated Google Auth Button -->
            <button id="google-auth-btn" class="w-full bg-slate-900/60 hover:bg-slate-800/80 border border-white/5 rounded-xl py-3 text-sm font-semibold transition-all flex items-center justify-center gap-3 cursor-pointer">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_64dp.png" alt="Google" class="w-5 h-5">
                <span>Continue with Google</span>
            </button>

            <!-- Redirect Link -->
            <p class="text-center text-xs text-slate-400 pt-2">
                New to the ecosystem? <a href="register.html" class="text-cyan-400 font-bold hover:underline">Register Store Free</a>
            </p>
        </div>
    </main>

    <!-- 💳 FOOTER LAYER -->
    <footer class="w-full border-t border-white/5 bg-slate-950/40 px-6 py-4 text-center text-xs text-slate-600">
        <p>&copy; 2026 CymorTechServices. Built by Legendary Smiley Cymor.</p>
    </footer>

    <!-- Live Infrastructure Firebase Auth Integration Engine Module -->
    <script type="module">
        import { loginMerchantWithEmail, authenticateWithGoogle } from "./firebase-config.js";

        // Handle Native Credential Login Verification
        document.getElementById("login-form")?.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorBox = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");

            try {
                const result = await loginMerchantWithEmail(email, password);
                
                // Track current active identity context locally for route mapping
                localStorage.setItem("cymor_merchant_user", JSON.stringify({ 
                    uid: result.user.uid, 
                    name: result.user.displayName || email.split('@')[0] 
                }));
                
                // Route directly onto the application wizard interface
                window.location.href = "form.html";
            } catch (err) {
                // Parse standard Firebase codes cleanly for user display
                if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
                    errorText.textContent = "Access denied. Invalid email or password confirmation details.";
                } else {
                    errorText.textContent = err.message;
                }
                errorBox.classList.remove("hidden");
            }
        });

        // Handle Google 1-Click Popup Auth Identity Access
        document.getElementById("google-auth-btn")?.addEventListener("click", async () => {
            const errorBox = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            
            try {
                const result = await authenticateWithGoogle();
                localStorage.setItem("cymor_merchant_user", JSON.stringify({ 
                    uid: result.user.uid, 
                    name: result.user.displayName 
                }));
                window.location.href = "form.html";
            } catch (err) {
                console.error(err);
                errorText.textContent = err.message;
                errorBox.classList.remove("hidden");
            }
        });
    </script>
</body>
</html>
